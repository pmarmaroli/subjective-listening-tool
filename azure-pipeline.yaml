trigger:
  - master

pool:
  vmImage: "ubuntu-latest"

steps:
  - task: UseNode@1
    inputs:
      versionSpec: "20.x"
    displayName: "Install Node.js"

  - script: |
      npm install
    displayName: "Install dependencies"

  - script: |
      npm run build || echo "No build script found"
    displayName: "Build project"

  - task: ArchiveFiles@2
    inputs:
      rootFolderOrFile: "$(System.DefaultWorkingDirectory)"
      includeRootFolder: false
      archiveType: "zip"
      archiveFile: "$(Build.ArtifactStagingDirectory)/output.zip"
    displayName: "Archive files"

  - task: AzureWebApp@1
    inputs:
      # TODO: Replace with your Azure Service Connection name from Azure DevOps
      azureSubscription: "YOUR_AZURE_SERVICE_CONNECTION_NAME"
      appType: "webApp"
      # TODO: Replace with your Web App name
      appName: "YOUR_WEB_APP_NAME"
      package: "$(Build.ArtifactStagingDirectory)/output.zip"
    displayName: "Deploy to Azure Web App"
