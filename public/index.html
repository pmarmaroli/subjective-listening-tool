<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">
    <title>Tallinn Audio Player</title>
    <link rel="icon"
        href="favicon-32x32.ico"
        type="image/x-icon">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
        rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
        rel="stylesheet">
    <link href="css/style.css"
        rel="stylesheet">
    <!-- Peaks.js CSS -->
    <style>
        #peaks-container {
            width: 100%;
            height: 300px;
        }
        #zoomview-container {
            width: 100%;
            height: 200px;
        }
        #overview-container {
            width: 100%;
            height: 100px;
        }
    </style>

</head>

<body>
    <div class="header-section">
        <h1 class="main-title"><i class="fas fa-headphones"></i> Subjective Listening Tool</h1>
    </div>
    
    <!-- Authentication Section -->
    <div id="authSection" class="container" style="max-width: 500px; margin-top: 50px;">
        <div class="status-card">
            <h3 style="text-align: center; color: #2c3e50; margin-bottom: 20px;">
                <i class="fas fa-key"></i> Access Selection
            </h3>
            
            <div style="margin-bottom: 25px;">
                <label style="display: block; margin-bottom: 15px; font-weight: bold; color: #2c3e50;">
                    <input type="radio" name="accessType" value="admin" id="adminAccess" style="margin-right: 10px;">
                    <i class="fas fa-user-shield"></i> Admin Access
                    <small style="display: block; margin-left: 25px; color: #6c757d; font-weight: normal;">
                        Create and manage projects
                    </small>
                </label>
                
                <label style="display: block; font-weight: bold; color: #2c3e50;">
                    <input type="radio" name="accessType" value="listener" id="listenerAccess" checked style="margin-right: 10px;">
                    <i class="fas fa-headphones"></i> Listener Access
                    <small style="display: block; margin-left: 25px; color: #6c757d; font-weight: normal;">
                        Access existing project
                    </small>
                </label>
            </div>
            
            <div class="form-group">
                <label for="passwordInput" id="passwordLabel" style="font-weight: bold; color: #2c3e50;">
                    <i class="fas fa-lock"></i> Enter Project Password:
                </label>
                <input type="password" 
                       class="form-control" 
                       id="passwordInput" 
                       placeholder="Enter password">
            </div>
            
            <button class="btn btn-info btn-block" 
                    onclick="authenticateUser()" 
                    style="margin-top: 20px;">
                <i class="fas fa-sign-in-alt"></i> Access
            </button>
            
            <p id="authError" style="color: #dc3545; text-align: center; margin-top: 15px; display: none;">
                <i class="fas fa-exclamation-circle"></i> <span id="authErrorText"></span>
            </p>
        </div>
    </div>
    
    <!-- Main Application (hidden until authenticated) -->
    <div id="mainApp" class="container" style="display: none;">
        <!-- <div class="controls"> -->
        <div class="status-card">
            <p id="currentTrack" class="status-text"><i class="fas fa-music"></i> Please select your project</p>
            <button id="logoutButton" 
                    class="btn btn-sm btn-secondary hidden" 
                    onclick="logoutUser()"
                    style="position: absolute; top: 10px; right: 10px;">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
        <div id="button-project-container"
            class="button-container">
            <button id="createProjectButton"
                class="btn btn-light custom-button hidden"
                style="width: 200px; text-align: center;"
                onclick="window.location.href='create_project.html'"><i class="fas fa-edit"></i> Create / Edit Project</button>
            <button id="playPauseButton"
                class="btn btn-success custom-button hidden"
                style="width: 100px; text-align: center; margin-top: 20px; margin-bottom: 20px;"><i class="fas fa-play"></i> PLAY</button>
            <!-- </div> -->
        </div>

        <div class="controls">
            <h3 class="section-title"><i class="fas fa-waveform-path"></i> Audio Waveform</h3>
            <div style="display: flex; justify-content: center; margin-bottom: 20px;">
                <div id="project-container" style="width: 100%; max-width: 600px;"></div>
            </div>
            <div id="peaks-container">
                <div id="zoomview-container"></div>
                <div id="overview-container"></div>
            </div>
            <audio id="audio" controls crossorigin="anonymous" style="width: 100%; margin-top: 10px;"></audio>
        </div>
        
        <div class="container">
            <h3 class="section-title"><i class="fas fa-volume-up"></i> Audio Sources</h3>
            <div id="visual-container">
                <div class="button-container">
                    <button id="switchToSpeaker1"
                        class="btn btn-info custom-button hidden"></button>
                    <button id="switchToSpeaker2"
                        class="btn btn-info custom-button hidden"></button>
                    <button id="switchToSpeaker3"
                        class="btn btn-info custom-button hidden"></button>
                    <button id="switchToSpeaker4"
                        class="btn btn-info custom-button hidden"></button>
                    <button id="switchToSpeaker5"
                        class="btn btn-info custom-button hidden"></button>
                    <button id="switchToSpeaker6"
                        class="btn btn-info custom-button hidden"></button>
                    <button id="switchToSpeaker7"
                        class="btn btn-info custom-button hidden"></button>
                    <button id="switchToSpeaker8"
                        class="btn btn-info custom-button hidden"></button>
                    <button id="switchToSpeaker9"
                        class="btn btn-info custom-button hidden"></button>
                    <button id="switchToSpeaker10"
                        class="btn btn-info custom-button hidden"></button>
                </div>
            </div>
        </div>

        <div class="container">
            <h3 class="section-title"><i class="fas fa-chart-bar"></i> Frequency Spectrum</h3>
            <canvas id="audioSpectrum"></canvas>
        </div>
    </div>

    <script src="/node_modules/peaks.js/dist/peaks.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
